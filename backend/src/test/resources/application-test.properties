# ── Disable .env import in CI (no .env file exists on the runner) ─────────────
spring.config.import=

# ── In-memory H2 database ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# ── Dummy JWT ─────────────────────────────────────────────────────────────────
application.security.jwt.secret-key=TestSecretKeyForJWTThatIsLongEnoughToWork1234
application.security.jwt.expiration=86400000

# ── Dummy Google OAuth2 ───────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost/login/oauth2/code/google

# ── Dummy Mail ────────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test@test.com
spring.mail.password=dummypassword
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ── App URLs ──────────────────────────────────────────────────────────────────
app.frontend-url=http://localhost:5173
app.oauth2.redirect-uri=http://localhost:5173